
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Menú del Café de Laura</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>Menú del Café de Laura</h1>

  <section id="login-section">
    <h2>Login Administrador</h2>
    <input id="username" type="text" name="username" placeholder="Usuario" />
    <input id="password" type="password" name="password" placeholder="Contraseña" />
    <button id="login-btn">Entrar</button>
    <p id="login-error" class="error"></p>
  </section>

  <section id="menu-section" style="display:none;">
    <nav id="menu-container"></nav>
    <button id="edit-menu-btn">Editar Menú</button>
    <section id="editor" style="display:none;">
      <h3>Editor de Menú (JSON)</h3>
      <textarea id="menu-editor" rows="15" cols="60"></textarea><br />
      <button id="save-menu-btn">Guardar Cambios</button>
      <button id="cancel-edit-btn">Cancelar</button>
      <p id="editor-message"></p>
    </section>
  </section>

  <script src="app.js"></script>
</body>
</html>
